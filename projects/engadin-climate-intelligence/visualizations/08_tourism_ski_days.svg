<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, Helvetica, sans-serif">
    <rect width="900" height="500" fill="#F7F6F2" rx="0"/>

  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Skitaugliche Tage pro Saison / Ski-Viable Days per Season</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#64748b">Hohenzone 1800-2200m | Elevation zone 1800-2200m</text>

  <line x1="100" y1="65" x2="100" y2="400" stroke="#94a3b8" stroke-width="1"/>
  <line x1="100" y1="400" x2="840" y2="400" stroke="#94a3b8" stroke-width="1"/>

  <!-- Y-axis: 0-160 days, height=335, scale: 1 day = 2.09px -->
  <text x="95" y="400" text-anchor="end" font-size="10" fill="#64748b">0</text>
  <text x="95" y="358" text-anchor="end" font-size="10" fill="#64748b">20</text>
  <text x="95" y="317" text-anchor="end" font-size="10" fill="#64748b">40</text>
  <text x="95" y="275" text-anchor="end" font-size="10" fill="#64748b">60</text>
  <text x="95" y="233" text-anchor="end" font-size="10" fill="#64748b">80</text>
  <text x="95" y="191" text-anchor="end" font-size="10" fill="#64748b">100</text>
  <text x="95" y="149" text-anchor="end" font-size="10" fill="#64748b">120</text>
  <text x="95" y="107" text-anchor="end" font-size="10" fill="#64748b">140</text>
  <text x="95" y="65" text-anchor="end" font-size="10" fill="#64748b">160</text>
  <text x="35" y="240" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,35,240)">Tage / Days</text>

  <line x1="100" y1="358" x2="840" y2="358" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="100" y1="317" x2="840" y2="317" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="100" y1="275" x2="840" y2="275" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="100" y1="233" x2="840" y2="233" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="100" y1="191" x2="840" y2="191" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="100" y1="149" x2="840" y2="149" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="100" y1="107" x2="840" y2="107" stroke="#e2e8f0" stroke-width="0.5"/>

  <!-- Projection zone -->
  <rect x="640" y="65" width="200" height="335" fill="#fef3c7" opacity="0.25" rx="0"/>
  <text x="740" y="80" text-anchor="middle" font-size="9" fill="#92400e">Projektion / Projection</text>

  <!-- X-axis: seasons -->
  <text x="140" y="418" text-anchor="middle" font-size="9" fill="#64748b">90/91</text>
  <text x="230" y="418" text-anchor="middle" font-size="9" fill="#64748b">95/96</text>
  <text x="320" y="418" text-anchor="middle" font-size="9" fill="#64748b">00/01</text>
  <text x="410" y="418" text-anchor="middle" font-size="9" fill="#64748b">05/06</text>
  <text x="500" y="418" text-anchor="middle" font-size="9" fill="#64748b">10/11</text>
  <text x="570" y="418" text-anchor="middle" font-size="9" fill="#64748b">15/16</text>
  <text x="620" y="418" text-anchor="middle" font-size="9" fill="#64748b">20/21</text>
  <text x="660" y="418" text-anchor="middle" font-size="9" fill="#64748b">24/25</text>
  <text x="710" y="418" text-anchor="middle" font-size="9" fill="#64748b">28/29</text>
  <text x="760" y="418" text-anchor="middle" font-size="9" fill="#64748b">32/33</text>
  <text x="820" y="418" text-anchor="middle" font-size="9" fill="#64748b">35/36</text>

  <!-- Historical bars: 145,148,140,132,128,118,112,105 -->
  <!-- y = 400 - (days * 2.09) -->
  <rect x="125" y="97" width="30" height="303" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="140" y="92" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">145</text>
  <rect x="215" y="91" width="30" height="309" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="230" y="86" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">148</text>
  <rect x="305" y="107" width="30" height="293" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="320" y="102" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">140</text>
  <rect x="395" y="124" width="30" height="276" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="410" y="119" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">132</text>
  <rect x="485" y="133" width="30" height="267" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="500" y="128" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">128</text>
  <rect x="555" y="153" width="30" height="247" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="570" y="148" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">118</text>
  <rect x="605" y="166" width="30" height="234" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="620" y="161" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">112</text>
  <rect x="645" y="181" width="30" height="219" fill="#3b82f6" rx="0" opacity="0.7"/>
  <text x="660" y="176" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">105</text>

  <!-- RCP2.6 projected: 100,96,93 -->
  <rect x="695" y="191" width="30" height="209" fill="#22c55e" rx="0" opacity="0.7"/>
  <text x="710" y="186" text-anchor="middle" font-size="9" fill="#166534">100</text>
  <rect x="745" y="199" width="30" height="201" fill="#22c55e" rx="0" opacity="0.7"/>
  <text x="760" y="194" text-anchor="middle" font-size="9" fill="#166534">96</text>
  <rect x="805" y="206" width="30" height="194" fill="#22c55e" rx="0" opacity="0.7"/>
  <text x="820" y="201" text-anchor="middle" font-size="9" fill="#166534">93</text>

  <!-- RCP8.5 ghost bars -->
  <rect x="700" y="222" width="20" height="178" fill="#ef4444" rx="0" opacity="0.3"/>
  <text x="710" y="218" text-anchor="middle" font-size="8" fill="#dc2626">85</text>
  <rect x="750" y="249" width="20" height="151" fill="#ef4444" rx="0" opacity="0.3"/>
  <text x="760" y="245" text-anchor="middle" font-size="8" fill="#dc2626">72</text>
  <rect x="810" y="270" width="20" height="130" fill="#ef4444" rx="0" opacity="0.3"/>
  <text x="820" y="266" text-anchor="middle" font-size="8" fill="#dc2626">62</text>

  <!-- Trend annotation -->
  <line x1="140" y1="97" x2="820" y2="206" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.4"/>
  <rect x="300" y="70" width="300" height="22" fill="white" rx="0" stroke="#dc2626" opacity="0.9"/>
  <text x="450" y="86" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">-36% bis -57% Reduktion / reduction by 2036</text>

  <!-- Legend -->
  <rect x="130" y="440" width="640" height="35" fill="white" rx="0" stroke="#e2e8f0"/>
  <rect x="150" y="450" width="15" height="15" fill="#3b82f6" rx="0" opacity="0.8"/>
  <text x="170" y="462" font-size="10" fill="#1e293b">Historisch / Historical</text>
  <rect x="310" y="450" width="15" height="15" fill="#22c55e" rx="0" opacity="0.7"/>
  <text x="330" y="462" font-size="10" fill="#1e293b">RCP2.6 (best case)</text>
  <rect x="480" y="450" width="15" height="15" fill="#ef4444" rx="0" opacity="0.3"/>
  <text x="500" y="462" font-size="10" fill="#1e293b">RCP8.5 (worst case)</text>

  <text x="450" y="495" text-anchor="middle" font-size="8" fill="#94a3b8">Quellen / Sources: SLF, Seilbahnen Schweiz, CH2018 Schneeszenarien / snow scenarios</text>
</svg>
