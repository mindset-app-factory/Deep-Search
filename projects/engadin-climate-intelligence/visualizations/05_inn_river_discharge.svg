<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, Helvetica, sans-serif">
    <rect width="900" height="500" fill="#F7F6F2" rx="0"/>

  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Inn Abfluss Saisonmuster / Inn River Discharge Seasonal Pattern</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#64748b">Martina Station — Historisch vs. Projektionen / Historical vs. Projections</text>

  <line x1="80" y1="65" x2="80" y2="400" stroke="#94a3b8" stroke-width="1"/>
  <line x1="80" y1="400" x2="840" y2="400" stroke="#94a3b8" stroke-width="1"/>

  <!-- Y-axis: 0-70 m3/s, height=335, scale: 1 m3/s = 4.79px -->
  <text x="75" y="400" text-anchor="end" font-size="10" fill="#64748b">0</text>
  <text x="75" y="352" text-anchor="end" font-size="10" fill="#64748b">10</text>
  <text x="75" y="304" text-anchor="end" font-size="10" fill="#64748b">20</text>
  <text x="75" y="257" text-anchor="end" font-size="10" fill="#64748b">30</text>
  <text x="75" y="209" text-anchor="end" font-size="10" fill="#64748b">40</text>
  <text x="75" y="161" text-anchor="end" font-size="10" fill="#64748b">50</text>
  <text x="75" y="113" text-anchor="end" font-size="10" fill="#64748b">60</text>
  <text x="75" y="65" text-anchor="end" font-size="10" fill="#64748b">70 m3/s</text>
  <text x="25" y="240" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,25,240)">m3/s</text>

  <line x1="80" y1="352" x2="840" y2="352" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="80" y1="304" x2="840" y2="304" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="80" y1="257" x2="840" y2="257" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="80" y1="209" x2="840" y2="209" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="80" y1="161" x2="840" y2="161" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="80" y1="113" x2="840" y2="113" stroke="#e2e8f0" stroke-width="0.5"/>

  <!-- X-axis months -->
  <text x="112" y="418" text-anchor="middle" font-size="10" fill="#64748b">Jan</text>
  <text x="175" y="418" text-anchor="middle" font-size="10" fill="#64748b">Feb</text>
  <text x="238" y="418" text-anchor="middle" font-size="10" fill="#64748b">Mar</text>
  <text x="301" y="418" text-anchor="middle" font-size="10" fill="#64748b">Apr</text>
  <text x="364" y="418" text-anchor="middle" font-size="10" fill="#64748b">Mai</text>
  <text x="427" y="418" text-anchor="middle" font-size="10" fill="#64748b">Jun</text>
  <text x="490" y="418" text-anchor="middle" font-size="10" fill="#64748b">Jul</text>
  <text x="553" y="418" text-anchor="middle" font-size="10" fill="#64748b">Aug</text>
  <text x="616" y="418" text-anchor="middle" font-size="10" fill="#64748b">Sep</text>
  <text x="679" y="418" text-anchor="middle" font-size="10" fill="#64748b">Okt</text>
  <text x="742" y="418" text-anchor="middle" font-size="10" fill="#64748b">Nov</text>
  <text x="805" y="418" text-anchor="middle" font-size="10" fill="#64748b">Dez</text>

  <!-- Historical: Jan=8.2 Feb=6.8 Mar=8.5 Apr=18.5 May=42 Jun=65 Jul=58 Aug=45 Sep=30 Oct=18 Nov=12.5 Dec=9.5 -->
  <!-- y = 400 - (val * 4.79) -->
  <polyline points="112,361 175,367 238,359 301,311 364,199 427,89 490,122 553,184 616,256 679,314 742,340 805,354"
    fill="none" stroke="#2563eb" stroke-width="3" stroke-linejoin="round"/>

  <!-- RCP8.5: Jan=9.2 Feb=8 Mar=11.5 Apr=25 May=52 Jun=54 Jul=42 Aug=30 Sep=22 Oct=15.5 Nov=11.2 Dec=9.5 -->
  <polyline points="112,356 175,362 238,345 301,280 364,151 427,141 490,199 553,256 616,295 679,326 742,346 805,354"
    fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3" stroke-linejoin="round"/>

  <!-- RCP2.6 -->
  <polyline points="112,359 175,365 238,354 301,299 364,180 427,103 490,151 553,208 616,271 679,319 742,343 805,356"
    fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,2" stroke-linejoin="round"/>

  <!-- Annotation arrows -->
  <text x="460" y="80" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="bold">Fruhere Spitze / Earlier peak</text>
  <line x1="410" y1="85" x2="370" y2="140" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="580" y="170" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="bold">Sommertrockenheit / Summer drought</text>

  <!-- Legend -->
  <rect x="130" y="440" width="580" height="35" fill="white" rx="0" stroke="#e2e8f0"/>
  <line x1="150" y1="458" x2="185" y2="458" stroke="#2563eb" stroke-width="3"/>
  <text x="190" y="462" font-size="10" fill="#1e293b">Historisch / Historical (1991-2020)</text>
  <line x1="390" y1="458" x2="425" y2="458" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="430" y="462" font-size="10" fill="#1e293b">RCP2.6</text>
  <line x1="500" y1="458" x2="535" y2="458" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="540" y="462" font-size="10" fill="#1e293b">RCP8.5 (2026-2036)</text>

  <text x="450" y="495" text-anchor="middle" font-size="8" fill="#94a3b8">Quellen / Sources: FOEN Abflussdaten Martina, CH2018 hydrologische Szenarien / hydrological scenarios</text>
</svg>
